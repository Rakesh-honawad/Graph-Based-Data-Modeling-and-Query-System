services:
  - type: web
    name: o2c-graph-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/etl.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
    staticPublishPath: ../frontend
